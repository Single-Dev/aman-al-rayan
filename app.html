<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Booking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .content {
            padding: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .service-list {
            display: grid;
            gap: 10px;
        }

        .service-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .service-card:hover {
            border-color: #667eea;
            background: #f0f2ff;
            transform: translateY(-2px);
        }

        .service-card.selected {
            border-color: #667eea;
            background: #f0f2ff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .service-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .service-desc {
            font-size: 13px;
            color: #999;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 6px;
        }

        input[type="date"],
        input[type="time"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="date"]:focus,
        input[type="time"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #ffe0e0;
            border-left: 4px solid #ff6b6b;
            color: #c92a2a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
            font-size: 13px;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #e7f5ff;
            border-left: 4px solid #339af0;
            color: #1971c2;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
            font-size: 13px;
        }

        .success.show {
            display: block;
        }

        .price-display {
            background: #f0f2ff;
            border: 1px solid #667eea;
            padding: 12px;
            border-radius: 6px;
            margin: 12px 0;
        }

        .price-display .label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .price-display .value {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
        }

        .deal-section {
            background: #fff8f0;
            border: 1px solid #ff9800;
            border-radius: 8px;
            padding: 12px;
            margin: 12px 0;
        }

        .deal-section .title {
            font-weight: 600;
            color: #e65100;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .price-slider-container {
            margin: 10px 0;
        }

        .price-slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #999;
            margin-bottom: 4px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }

        .proposed-price-display {
            text-align: center;
            font-weight: 600;
            color: #667eea;
            font-size: 16px;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📲 Book Service</h1>
            <p>Quick and easy booking</p>
        </div>

        <div class="content">
            <div id="error" class="error"></div>
            <div id="success" class="success"></div>

            <!-- Service Selection -->
            <div class="section">
                <div class="section-title">Select Service</div>
                <div class="service-list" id="serviceList"></div>
            </div>

            <!-- Date Selection -->
            <div class="section">
                <div class="input-group">
                    <label>📅 Preferred Date</label>
                    <input type="date" id="dateInput" required>
                </div>
            </div>

            <!-- Time Selection -->
            <div class="section">
                <div class="input-group">
                    <label>⏰ Preferred Time (Optional)</label>
                    <input type="time" id="timeInput">
                </div>
            </div>

            <!-- Price Display -->
            <div class="section" id="priceSection" style="display: none;">
                <div class="price-display">
                    <div class="label">💰 Base Price Range</div>
                    <div class="value" id="priceDisplay">AED 0</div>
                </div>
            </div>

            <!-- Deal Negotiation Panel -->
            <div class="section" id="dealSection" style="display: none;">
                <div class="deal-section">
                    <div class="title">💰 Propose Your Price</div>
                    
                    <div class="price-slider-container">
                        <div class="price-slider-labels">
                            <span>Min</span>
                            <span>Drag to set price</span>
                            <span>Max</span>
                        </div>
                        <input 
                            type="range" 
                            id="priceSlider" 
                            min="100" 
                            max="1000" 
                            value="300"
                            step="10"
                        >
                        <div class="proposed-price-display">
                            Your Price: <span id="proposedPriceText">AED 300</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Notes -->
            <div class="section">
                <div class="input-group">
                    <label>📝 Special Requests (Optional)</label>
                    <textarea id="notesInput" placeholder="Any special requests or notes..."></textarea>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="button-group">
                <button id="submitBtn" disabled>✓ Send Booking Request</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp
        let tg = null;
        let isTelegramApp = false;

        // Try to get Telegram WebApp
        if (typeof window.Telegram !== 'undefined' && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            isTelegramApp = true;
            tg.ready();
            tg.expand();
            console.log('✅ Telegram WebApp detected');
        } else {
            console.log('⚠️ Not running in Telegram - using fallback mode');
        }

        // Services data
        const SERVICES = {
            'standard_cleaning': {
                name: '🧹 Standard Cleaning',
                description: 'Regular weekly or bi-weekly cleaning for your home',
                price_min: 180,
                price_max: 200
            },
            'deep_cleaning': {
                name: '✨ Deep Cleaning',
                description: 'Thorough deep cleaning service for all surfaces',
                price_min: 220,
                price_max: 280
            },
            'office_cleaning': {
                name: '🏢 Office Cleaning',
                description: 'Professional office and commercial space cleaning',
                price_min: 250,
                price_max: 350
            },
            'mosque_cleaning': {
                name: '🕌 Mosque Cleaning',
                description: 'Specialized mosque and religious space cleaning',
                price_min: 300,
                price_max: 400
            },
            'move_in_out': {
                name: '📦 Move-In/Move-Out',
                description: 'Complete cleaning for moving in or out',
                price_min: 400,
                price_max: 600
            }
        };

        let selectedService = null;

        // Initialize date
        const dateInput = document.getElementById('dateInput');
        const today = new Date().toISOString().split('T')[0];
        dateInput.min = today;
        dateInput.value = today;

        // Load services
        function loadServices() {
            const serviceList = document.getElementById('serviceList');
            serviceList.innerHTML = '';

            Object.entries(SERVICES).forEach(([id, service]) => {
                const card = document.createElement('div');
                card.className = 'service-card';
                card.innerHTML = `
                    <div class="service-name">${service.name}</div>
                    <div class="service-desc">${service.description}</div>
                `;

                card.addEventListener('click', () => selectService(id, service, card));
                serviceList.appendChild(card);
            });
        }

        function selectService(id, service, element) {
            document.querySelectorAll('.service-card').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedService = { id, ...service };
            document.getElementById('submitBtn').disabled = false;
            updatePrice();
            showDealSection();
        }

        function updatePrice() {
            if (selectedService) {
                const priceDisplay = document.getElementById('priceDisplay');
                priceDisplay.textContent = `AED ${selectedService.price_min} - ${selectedService.price_max}`;
                document.getElementById('priceSection').style.display = 'block';
            }
        }

        function showDealSection() {
            if (selectedService) {
                document.getElementById('dealSection').style.display = 'block';
                
                // Update slider range
                const slider = document.getElementById('priceSlider');
                slider.min = selectedService.price_min - 50;
                slider.max = selectedService.price_max + 200;
                slider.value = (selectedService.price_min + selectedService.price_max) / 2;
                
                updateProposedPrice();
            }
        }

        // Update proposed price
        const priceSlider = document.getElementById('priceSlider');
        priceSlider.addEventListener('input', updateProposedPrice);

        function updateProposedPrice() {
            const value = parseInt(priceSlider.value);
            document.getElementById('proposedPriceText').textContent = `AED ${value}`;
        }

        // Submit
        document.getElementById('submitBtn').addEventListener('click', async () => {
            if (!selectedService) {
                showError('Please select a service');
                return;
            }

            const date = document.getElementById('dateInput').value;
            const time = document.getElementById('timeInput').value || '';
            const notes = document.getElementById('notesInput').value;
            const proposedPrice = parseInt(document.getElementById('priceSlider').value);

            if (!date) {
                showError('Please select a date');
                return;
            }

            const orderData = {
                service_id: selectedService.id,
                service_name: selectedService.name,
                date: date,
                time: time,
                price_min: selectedService.price_min,
                price_max: selectedService.price_max,
                proposed_price: proposedPrice,
                notes: notes
            };

            // Send to Telegram bot
            if (isTelegramApp && tg) {
                try {
                    tg.sendData(JSON.stringify(orderData));
                    showSuccess('✅ Booking sent to bot! Closing...');
                    // Close after a short delay
                    setTimeout(() => {
                        if (tg && tg.close) {
                            tg.close();
                        }
                    }, 1000);
                } catch (error) {
                    showError('Error sending data to bot: ' + error.message);
                }
            } else {
                showSuccess('✅ Booking ready! (You\'re not in Telegram app)');
                console.log('Order data:', orderData);
            }
        });

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 4000);
        }

        function showSuccess(message) {
            const successEl = document.getElementById('success');
            successEl.textContent = message;
            successEl.classList.add('show');
        }

        // Load services on page load
        loadServices();
    </script>
</body>
</html>
