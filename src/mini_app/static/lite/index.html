<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Service Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .service-list {
            display: grid;
            gap: 10px;
        }

        .service-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .service-card:hover {
            border-color: #667eea;
            background: #f0f2ff;
            transform: translateY(-2px);
        }

        .service-card.selected {
            border-color: #667eea;
            background: #f0f2ff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .service-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .service-desc {
            font-size: 13px;
            color: #999;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 6px;
        }

        input[type="date"],
        input[type="time"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="date"]:focus,
        input[type="time"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-quote {
            background: #f0f2ff;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-quote:hover {
            background: #667eea;
            color: white;
        }

        .btn-order {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-order:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-order:disabled,
        .btn-quote:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f0f2ff;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .quote-result {
            display: none;
            background: #f0f2ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .quote-result.show {
            display: block;
        }

        .price-range {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
            margin: 8px 0;
        }

        .error {
            background: #ffe0e0;
            border-left: 4px solid #ff6b6b;
            color: #c92a2a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 16px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            display: block;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 20px;
            }

            button {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📲 Quick Service</h1>
            <p>Browse and book in seconds</p>
        </div>

        <div class="content">
            <div id="error" class="error"></div>
            <div id="quoteResult" class="quote-result"></div>

            <!-- Service Selection -->
            <div class="section">
                <div class="section-title">Select Service</div>
                <div class="service-list" id="serviceList"></div>
            </div>

            <!-- Date Selection -->
            <div class="section">
                <div class="input-group">
                    <label>Preferred Date</label>
                    <input type="date" id="dateInput" min="">
                </div>
            </div>

            <!-- Time Selection -->
            <div class="section">
                <div class="input-group">
                    <label>Preferred Time (Optional)</label>
                    <input type="time" id="timeInput">
                </div>
            </div>

            <!-- Actions -->
            <div class="button-group">
                <button class="btn-quote" id="getQuoteBtn">📊 Get Quote</button>
                <button class="btn-order" id="submitBtn" disabled>✓ Send Order</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Initialize date with today's date
        const dateInput = document.getElementById('dateInput');
        const today = new Date().toISOString().split('T')[0];
        dateInput.min = today;
        dateInput.value = today;

        // Get init data from URL or window variable
        let initData = new URLSearchParams(window.location.search).get('initData');
        if (!initData && window.initData) {
            initData = window.initData;
        }

        let selectedService = null;
        let quoteData = null;

        // Load services on page load
        async function loadServices() {
            try {
                const response = await fetch(`/api/v1/services?init_data=${encodeURIComponent(initData)}`);
                const services = await response.json();

                const serviceList = document.getElementById('serviceList');
                serviceList.innerHTML = '';

                services.forEach(service => {
                    const card = document.createElement('div');
                    card.className = 'service-card';
                    card.innerHTML = `<div class="service-name">${service.name}</div><div class="service-desc">${service.description}</div>`;

                    card.addEventListener('click', () => selectService(service, card));
                    serviceList.appendChild(card);
                });
            } catch (error) {
                showError('Failed to load services');
                console.error('Error loading services:', error);
            }
        }

        function selectService(service, element) {
            document.querySelectorAll('.service-card').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedService = service;
            document.getElementById('submitBtn').disabled = false;
        }

        // Get Quote
        document.getElementById('getQuoteBtn').addEventListener('click', async () => {
            if (!selectedService) {
                showError('Please select a service');
                return;
            }

            const date = document.getElementById('dateInput').value;
            const time = document.getElementById('timeInput').value || null;

            try {
                showLoading(true);
                const response = await fetch('/api/v1/quote', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        service_id: selectedService.id,
                        date: date,
                        time: time
                    })
                });

                if (!response.ok) throw new Error('Failed to get quote');

                quoteData = await response.json();
                showQuote(quoteData);
                showToast(`Quote: AED ${quoteData.price_min} - ${quoteData.price_max}`);
            } catch (error) {
                showError('Failed to get quote: ' + error.message);
            } finally {
                showLoading(false);
            }
        });

        // Submit Order
        document.getElementById('submitBtn').addEventListener('click', async () => {
            if (!selectedService) return;

            const date = document.getElementById('dateInput').value;
            const time = document.getElementById('timeInput').value || null;

            try {
                showLoading(true);

                const orderData = {
                    service_id: selectedService.id,
                    service_name: selectedService.name,
                    date: date,
                    time: time,
                    proposed_price: quoteData?.price_min || 250,
                    quantity: 1,
                    version: 'lite'
                };

                const response = await fetch('/api/v1/submit-order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(orderData)
                });

                const result = await response.json();

                if (response.ok && result.status === 'created') {
                    showToast('Order sent! Waiting for admin review.');

                    // Send data back to bot
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.sendData(JSON.stringify(orderData));
                    }

                    // Reset form
                    setTimeout(() => {
                        loadServices();
                        document.getElementById('dateInput').value = today;
                        document.getElementById('timeInput').value = '';
                        selectedService = null;
                        quoteData = null;
                        document.getElementById('submitBtn').disabled = true;
                        document.getElementById('quoteResult').classList.remove('show');
                    }, 1500);
                } else {
                    showError(result.message || 'Failed to submit order');
                }
            } catch (error) {
                showError('Error: ' + error.message);
            } finally {
                showLoading(false);
            }
        });

        function showQuote(quote) {
            const quoteResult = document.getElementById('quoteResult');
            quoteResult.innerHTML = `
                <div style="font-size: 12px; color: #666; margin-bottom: 6px;">${quote.service_name}</div>
                <div style="font-size: 12px; color: #999; margin-bottom: 8px;">📅 ${quote.date}${quote.time ? ' at ' + quote.time : ''}</div>
                <div class="price-range">AED ${quote.price_min} - ${quote.price_max}</div>
            `;
            quoteResult.classList.add('show');
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 4000);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showLoading(show) {
            // Using toast to show loading
            if (show) {
                const loader = document.getElementById('toast');
                loader.innerHTML = '<div class="spinner"></div><span>Loading...</span>';
                loader.classList.add('show');
            }
        }

        // Telegram WebApp initialization
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // Load services on page load
        loadServices();
    </script>
</body>
</html>
